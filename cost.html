<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cost Analyzer | LLM Dev Tools</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-logo">🛠️ LLM Dev Tools</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="tokens.html">Token Counter</a>
    <a href="cost.html" class="active">Cost Analyzer</a>
  </div>
</nav>

<div class="container">
  <h1>💰 Cost Analyzer</h1>
  <textarea id="costInput" placeholder="Paste text to calculate cost..."></textarea>
  
  <div class="controls">
    <select id="modelSelect">
        <!-- GPT-5 Family -->
        <option value="gpt-5.2_input">GPT-5.2 Input</option>
        <option value="gpt-5.2_output">GPT-5.2 Output</option>
        <option value="gpt-5.2_pro_input">GPT-5.2 Pro Input</option>
        <option value="gpt-5.2_pro_output">GPT-5.2 Pro Output</option>
        <option value="gpt-5.0_input">GPT-5.0 Input</option>
        <option value="gpt-5.0_output">GPT-5.0 Output</option>
        <option value="gpt-5-mini_input">GPT-5 Mini Input</option>
        <option value="gpt-5-mini_output">GPT-5 Mini Output</option>
        <option value="gpt-5-nano_input">GPT-5 Nano Input</option>
        <option value="gpt-5-nano_output">GPT-5 Nano Output</option>

        <!-- GPT-4 Family -->
        <option value="gpt-4.1_input">GPT-4.1 Input</option>
        <option value="gpt-4.1_output">GPT-4.1 Output</option>
        <option value="gpt-4.1-mini_input">GPT-4.1 Mini Input</option>
        <option value="gpt-4.1-mini_output">GPT-4.1 Mini Output</option>
        <option value="gpt-4.1-nano_input">GPT-4.1 Nano Input</option>
        <option value="gpt-4.1-nano_output">GPT-4.1 Nano Output</option>

        <!-- Realtime API -->
        <option value="gpt-realtime_input">GPT Realtime Input</option>
        <option value="gpt-realtime_output">GPT Realtime Output</option>
        <option value="gpt-realtime-mini_input">GPT Realtime Mini Input</option>
        <option value="gpt-realtime-mini_output">GPT Realtime Mini Output</option>

        <!-- Legacy GPT-3.5 -->
        <option value="gpt-3.5-turbo">GPT-3.5 Turbo Input</option>
        <option value="gpt-3.5-turbo_output">GPT-3.5 Turbo Output</option>
    </select>
    <button id="calcBtn">Calculate Cost</button>
    </div>

  <div id="costResult" class="result-box">Select a model and click analyze.</div>
</div>

<script>
  document.getElementById("calcBtn").onclick = async () => {
    const text = document.getElementById("costInput").value;
    const model = document.getElementById("modelSelect").value;
    const res = document.getElementById("costResult");

    if(!text.trim()) return;
    res.innerHTML = "Calculating...";

    try {
      // Step 1: Get Token Count
      const tRes = await fetch('https://web-production-7ac18.up.railway.app/tokens/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      const tData = await tRes.json();
      
      // Step 2: Get Cost
      const cRes = await fetch('https://web-production-7ac18.up.railway.app/cost/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tokens: tData.token_count, model: model })
      });
      const cData = await cRes.json();

      res.innerHTML = `
        <p><strong>Tokens:</strong> ${tData.token_count}</p>
        <p><strong>Estimated Cost:</strong> ${cData.token_count || cData.cost || cData.estimated_cost}</p>
      `;
    } catch (e) {
      res.innerHTML = "Error processing request.";
    }
  };
</script>
</body>
</html>
