<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Word & Cost Analyzer</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<h1>🔍 Word & Cost Analyzer</h1>

<textarea id="wordInput" placeholder="Enter text to analyze..."></textarea>

<div class="controls">
  <select id="modelSelect">
    <option value="gpt-4">GPT-4</option>
    <option value="gpt-4o">GPT-4o</option>
    <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
  </select>
  <button id="analyzeBtn">Analyze & Calculate Cost</button>
</div>

<div id="analysis">Results will appear here...</div>

<script>
  async function analyze() {
    const text = document.getElementById("wordInput").value;
    const model = document.getElementById("modelSelect").value;
    const analysisDiv = document.getElementById("analysis");
    const btn = document.getElementById("analyzeBtn");

    if (!text.trim()) {
      analysisDiv.innerHTML = "Please enter some text.";
      return;
    }

    btn.disabled = true;
    analysisDiv.innerHTML = "Processing...";

    try {
      // 1. Get Token Count first
      const tokenRes = await fetch('https://web-production-7ac18.up.railway.app/tokens/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ "text": text })
      });
      const tokenData = await tokenRes.json();
      const count = tokenData.token_count;

      // 2. Get Cost using the token count and selected model
      const costRes = await fetch('https://web-production-7ac18.up.railway.app/cost/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ "tokens": count, "model": model })
      });
      const costData = await costRes.json();

      // Basic local stats
      const charCount = text.length;
      const byteLength = new TextEncoder().encode(text).length;

      // Display Results
      analysisDiv.innerHTML = `
        <div class="stat-row"><strong>Tokens:</strong> ${count}</div>
        <div class="stat-row"><strong>Estimated Cost:</strong> ${costData.cost || costData.estimated_cost || JSON.stringify(costData)}</div>
        <hr>
        <div class="stat-row">Characters: ${charCount}</div>
        <div class="stat-row">Bytes: ${byteLength}</div>
        <div class="stat-row">Leading Space: ${text.startsWith(" ") ? "Yes" : "No"}</div>
      `;

    } catch (error) {
      analysisDiv.innerHTML = `<span style="color:red">Error: ${error.message}</span>`;
    } finally {
      btn.disabled = false;
    }
  }

  document.getElementById("analyzeBtn").onclick = analyze;
</script>

</body>
</html>
