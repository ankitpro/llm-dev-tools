<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Token Counter</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<h1>🧮 Real Token Counter (OpenAI BPE)</h1>

<textarea id="inputText" placeholder="Paste your prompt here..."></textarea>
<br>
<button onclick="countTokens()">Count Tokens</button>

<div class="result" id="result"></div>

<script type="module">
  import { encoding_for_model } from "https://cdn.jsdelivr.net/npm/@dqbd/tiktoken@1.0.7/+esm";

  const enc = encoding_for_model("gpt-4");

  window.countTokens = function() {
    const text = document.getElementById("inputText").value;
    const tokens = enc.encode(text);
    document.getElementById("result").innerHTML =
      "Exact Token Count: " + tokens.length;
  }
</script>

</body>
</html>
