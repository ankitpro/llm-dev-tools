<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Token Counter</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<h1>🧮 Real OpenAI Token Counter</h1>

<textarea id="inputText" placeholder="Paste your prompt here..."></textarea>
<br>
<button id="countBtn">Count Tokens</button>

<div id="result">The count will appear here...</div>

<script>
  const countBtn = document.getElementById("countBtn");
  const resultDiv = document.getElementById("result");
  const inputText = document.getElementById("inputText");

  countBtn.onclick = async () => {
    const textValue = inputText.value.trim();
    
    if (!textValue) {
      resultDiv.innerHTML = "Please enter some text.";
      return;
    }

    resultDiv.innerHTML = "Counting...";
    countBtn.disabled = true;

    try {
      const response = await fetch('https://web-production-7ac18.up.railway.app/tokens/', {
        method: 'POST',
        headers: {
          'accept': 'application/json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ "text": textValue })
      });

      if (!response.ok) throw new Error('API Error');

      const data = await response.json();
      
      // FIX: Accessing the specific key "token_count" from your JSON response
      const finalCount = data.token_count;

      resultDiv.innerHTML = `<strong>Exact Token Count:</strong> ${finalCount}`;

    } catch (error) {
      resultDiv.innerHTML = `<span style="color:red">Error: Could not connect to the API.</span>`;
      console.error(error);
    } finally {
      countBtn.disabled = false;
    }
  };
</script>

</body>
</html>
