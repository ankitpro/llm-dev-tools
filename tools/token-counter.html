<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Token Counter</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<h1>🧮 Real OpenAI Token Counter</h1>

<textarea id="inputText" placeholder="Paste your prompt here..."></textarea>
<br>
<button id="countBtn">Count Tokens</button>

<div class="result" id="result"></div>

<script type="module">
  import { get_encoding } from "https://cdn.jsdelivr.net/npm/@dqbd/tiktoken@1.0.7/+esm";

  const enc = await get_encoding("cl100k_base");

  document.getElementById("countBtn").onclick = () => {
    const text = document.getElementById("inputText").value;
    const tokens = enc.encode(text);
    document.getElementById("result").innerHTML =
      "Exact Token Count: " + tokens.length;
  };
</script>

</body>
</html>
