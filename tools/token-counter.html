<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Token Counter</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<h1>🧮 Real Token Counter</h1>

<textarea id="inputText" placeholder="Paste your prompt here..."></textarea>
<br>
<button onclick="countTokens()">Count Tokens</button>

<div class="result" id="result"></div>

<script src="https://cdn.jsdelivr.net/npm/@dqbd/tiktoken@1.0.7/dist/tiktoken.js"></script>

<script>
  async function countTokens() {
    const text = document.getElementById("inputText").value;

    const enc = await window.tiktoken.encoding_for_model("gpt-4");
    const tokens = enc.encode(text);

    document.getElementById("result").innerHTML =
      "Exact Token Count: " + tokens.length;
  }
</script>

</body>
</html>
